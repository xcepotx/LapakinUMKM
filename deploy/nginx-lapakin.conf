# Lapakin Nginx Config (Production VPS)
#
# Letakkan di /etc/nginx/sites-available/lapakin
# Symlink ke /etc/nginx/sites-enabled/lapakin
# Test: sudo nginx -t
# Reload: sudo systemctl reload nginx
#
# CATATAN PENTING:
# 1. Block `map` HARUS di luar `server` block (di-load di http context)
# 2. Bot detection pakai TWO LOCATIONS terpisah, BUKAN if + try_files
#    karena nginx if-block antipattern
# 3. /api/og/shop/{slug}.png served via /api/ → proxy_pass ke backend

# Bot detection map (auto-detect social media crawlers)
map $http_user_agent $is_social_bot {
    default 0;
    "~*facebookexternalhit"  1;
    "~*Facebot"              1;
    "~*Twitterbot"           1;
    "~*LinkedInBot"          1;
    "~*WhatsApp"             1;
    "~*TelegramBot"          1;
    "~*Slackbot"             1;
    "~*Discordbot"           1;
    "~*Pinterest"            1;
    "~*Googlebot"            1;
}

# Use $is_social_bot to pick upstream destination for /toko/...
map $is_social_bot $toko_target {
    0  "@spa";
    1  "@og_html";
}

# Tenant subdomain root `/` target: bot → OG proxy, human → SPA
map $is_social_bot $tenant_root_target {
    0  "@tenant_spa";
    1  "@tenant_og";
}

server {
    listen 80;
    listen [::]:80;
    server_name lapakin.my.id www.lapakin.my.id *.lapakin.my.id;
    return 301 https://$host$request_uri;
}

# ============ MAIN DOMAIN: lapakin.my.id + www ============
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lapakin.my.id www.lapakin.my.id;

    # SSL (Certbot)
    ssl_certificate /etc/letsencrypt/live/lapakin.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lapakin.my.id/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    client_max_body_size 20M;

    root /home/lapakin/LapakinUMKM/frontend/build;
    index index.html;

    # robots.txt — always served as text/plain (gak di-fallback ke SPA)
    location = /robots.txt {
        try_files $uri =404;
        types { text/plain txt; }
        default_type text/plain;
        access_log off;
    }

    # Block scanner attempts — return 444 (no response)
    location ~* ^/(wordpress|wp-admin|wp-login|phpmyadmin|admin\.php|xmlrpc\.php|\.env|\.git) {
        deny all;
        return 444;
    }

    # API → backend
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # /toko/{slug} — bot ke backend OG HTML, human ke React SPA
    location ~* ^/toko/(?<shop_slug>[a-z0-9-]+)$ {
        try_files /dev/null $toko_target;
    }

    location @spa {
        try_files $uri /index.html;
    }

    location @og_html {
        proxy_pass http://127.0.0.1:8001/api/og/shop/$shop_slug;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 30s;
    }

    # Cache static assets
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|webp)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
        try_files $uri =404;
    }

    location / {
        try_files $uri /index.html;
    }
}

# ============ TENANT SUBDOMAIN: <slug>.lapakin.my.id (Pro tier) ============
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    # Regex: extract subdomain slug (a-z, 0-9, dash) — exclude www, admin, api
    server_name ~^(?<tenant_slug>(?!www|admin|api|cdn|static)[a-z0-9-]+)\.lapakin\.my\.id$;

    # WILDCARD SSL (harus generate pakai DNS-01 challenge)
    ssl_certificate /etc/letsencrypt/live/lapakin.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lapakin.my.id/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;

    client_max_body_size 20M;

    root /home/lapakin/LapakinUMKM/frontend/build;
    index index.html;

    # robots.txt — always served as text/plain (gak di-fallback ke SPA)
    location = /robots.txt {
        try_files $uri =404;
        types { text/plain txt; }
        default_type text/plain;
        access_log off;
    }

    # API tetap ke backend (subdomain tetap bisa call API)
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        # Lempar slug dari hostname ke backend biar bisa inject context
        proxy_set_header X-Tenant-Slug $tenant_slug;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # Root path `/` di subdomain → bot ke OG HTML, human ke React SPA
    # Pakai named location biar gak kena if+rewrite antipattern
    location = / {
        try_files /dev/null $tenant_root_target;
    }

    location @tenant_spa {
        try_files /index.html =404;
    }

    location @tenant_og {
        proxy_pass http://127.0.0.1:8001/api/og/shop/$tenant_slug;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 30s;
    }

    # Cache static assets
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|webp)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri /index.html;
    }
}
