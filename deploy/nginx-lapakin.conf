# Lapakin Nginx Config (Production VPS)
#
# Letakkan di /etc/nginx/sites-available/lapakin
# Symlink ke /etc/nginx/sites-enabled/lapakin
# Test: sudo nginx -t
# Reload: sudo systemctl reload nginx
#
# CATATAN PENTING:
# 1. Block `map` HARUS di luar `server` block (di-load di http context)
# 2. Bot detection pakai TWO LOCATIONS terpisah, BUKAN if + try_files
#    karena nginx if-block antipattern
# 3. /api/og/shop/{slug}.png served via /api/ → proxy_pass ke backend

# Bot detection map (auto-detect social media crawlers)
map $http_user_agent $is_social_bot {
    default 0;
    "~*facebookexternalhit"  1;
    "~*Facebot"              1;
    "~*Twitterbot"           1;
    "~*LinkedInBot"          1;
    "~*WhatsApp"             1;
    "~*TelegramBot"          1;
    "~*Slackbot"             1;
    "~*Discordbot"           1;
    "~*Pinterest"            1;
    "~*Googlebot"            1;
}

# Use $is_social_bot to pick upstream destination for /toko/...
map $is_social_bot $toko_target {
    0  "@spa";
    1  "@og_html";
}

server {
    listen 80;
    listen [::]:80;
    server_name lapakin.my.id www.lapakin.my.id;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lapakin.my.id www.lapakin.my.id;

    # SSL (di-isi otomatis sama Certbot)
    ssl_certificate /etc/letsencrypt/live/lapakin.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lapakin.my.id/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Big uploads (image AI enhance bisa 5-10 MB base64)
    client_max_body_size 20M;

    # Static frontend
    root /home/lapakin/LapakinUMKM/frontend/build;
    index index.html;

    # Block scanner attempts (WordPress, phpmyadmin, etc) — return 444 (no response)
    location ~* ^/(wordpress|wp-admin|wp-login|phpmyadmin|admin\.php|xmlrpc\.php|\.env|\.git) {
        deny all;
        return 444;
    }

    # API → backend (uvicorn pm2)
    # IMPORTANT: "^~" prefix = longest prefix match DITUNDA override oleh regex bawahnya.
    # Tanpa "^~", regex `\.(png|jpg|...)` bakal handle duluan request /api/og/shop/x.png.
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # /toko/{slug} — bot ke backend OG HTML, human ke React SPA
    location ~* ^/toko/(?<shop_slug>[a-z0-9-]+)$ {
        try_files /dev/null $toko_target;
    }

    # Named location: serve React SPA
    location @spa {
        try_files $uri /index.html;
    }

    # Named location: proxy ke backend OG HTML untuk bot
    location @og_html {
        proxy_pass http://127.0.0.1:8001/api/og/shop/$shop_slug;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 30s;
    }

    # Cache static assets aggressively
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|webp)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri /index.html;
    }
}
